global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: synapze
    env: production

scrape_configs:
  - job_name: synapze_api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    authorization:
      credentials_file: /etc/prometheus/metrics_token
    scrape_interval: 15s

  - job_name: postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # add alertmanager URL here

rule_files:
  - "alerts/*.yml"
