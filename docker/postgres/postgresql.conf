# ── PostgreSQL tuned for 4GB RAM + PgBouncer in front ─────────────────────────
# PgBouncer handles client connections; Postgres only sees ~100 server connections

max_connections            = 150          # PgBouncer + direct admin access
shared_buffers             = 1GB          # 25% of RAM
effective_cache_size       = 3GB          # 75% of RAM
maintenance_work_mem       = 256MB
checkpoint_completion_target = 0.9
wal_buffers                = 64MB
default_statistics_target  = 200
random_page_cost           = 1.1          # SSD
effective_io_concurrency   = 200          # SSD
work_mem                   = 10MB         # per-sort; 150 conns × 10MB = 1.5GB max
min_wal_size               = 2GB
max_wal_size               = 8GB
max_worker_processes       = 8
max_parallel_workers_per_gather = 4
max_parallel_workers       = 8
max_parallel_maintenance_workers = 4

# Connection handling (PgBouncer takes care of the rest)
tcp_keepalives_idle        = 60
tcp_keepalives_interval    = 10
tcp_keepalives_count       = 6

# Logging (slow query log)
log_min_duration_statement = 500          # log queries > 500ms
log_checkpoints            = on
log_lock_waits             = on
log_temp_files             = 0
log_line_prefix            = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_autovacuum_min_duration = 250ms

# Autovacuum (keep tables healthy under load)
autovacuum                 = on
autovacuum_max_workers     = 5
autovacuum_naptime         = 30s
autovacuum_vacuum_threshold = 100
autovacuum_analyze_threshold = 100
autovacuum_vacuum_scale_factor   = 0.05
autovacuum_analyze_scale_factor  = 0.02
autovacuum_vacuum_cost_limit     = 400

# pg_stat_statements (for query analysis)
shared_preload_libraries   = 'pg_stat_statements'
pg_stat_statements.track   = all
