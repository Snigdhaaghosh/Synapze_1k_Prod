# ── Worker tuning for 1,000 concurrent users ──────────────────────────────────
worker_processes      auto;              # one per CPU core
worker_rlimit_nofile  65535;             # file descriptor limit

events {
    worker_connections  4096;            # per worker (auto × 4096 = total capacity)
    use                 epoll;
    multi_accept        on;
}

http {
    # ── Basic settings ─────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    server_tokens       off;
    types_hash_max_size 4096;

    # ── Buffers ────────────────────────────────────────────────────────────────
    client_max_body_size        50M;
    client_body_buffer_size     128k;
    client_header_buffer_size   4k;
    large_client_header_buffers 8 16k;
    proxy_buffer_size           16k;
    proxy_buffers               8 32k;
    proxy_busy_buffers_size     64k;

    # ── Timeouts ───────────────────────────────────────────────────────────────
    client_body_timeout    30s;
    client_header_timeout  15s;
    send_timeout           30s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     30s;
    proxy_read_timeout    120s;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   4;
    gzip_types        text/plain text/css application/json application/javascript
                      application/x-ndjson text/xml application/xml;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api_zone:20m  rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=auth_zone:5m  rate=10r/m;
    limit_conn_zone $binary_remote_addr  zone=conn_zone:10m;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main_json escape=json
        '{"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":"$status",'
        '"bytes":$body_bytes_sent,'
        '"rt":"$request_time",'
        '"ip":"$remote_addr",'
        '"ua":"$http_user_agent"}';

    access_log /var/log/nginx/access.log main_json buffer=64k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ── API upstream — round-robin across 2 replicas ───────────────────────────
    # Docker Compose service name resolves to all replica IPs
    upstream synapze_api {
        least_conn;                       # least-connections balancing (better for SSE)
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 64;                     # persistent upstream connections
        keepalive_requests 1000;
        keepalive_timeout 75s;
    }

    upstream synapze_frontend {
        server frontend:3000;
        keepalive 8;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name your-domain.com;

        # ── TLS ────────────────────────────────────────────────────────────────
        ssl_certificate      /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key  /etc/nginx/ssl/privkey.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache    shared:SSL:20m;
        ssl_session_timeout  4h;
        ssl_session_tickets  off;
        ssl_stapling         on;
        ssl_stapling_verify  on;

        # ── Connection limit ──────────────────────────────────────────────────
        limit_conn conn_zone 50;         # 50 concurrent connections per IP

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"  always;
        add_header X-Frame-Options           "DENY"     always;
        add_header X-XSS-Protection          "1; mode=block" always;

        # ── SSE streaming endpoint — critical config ──────────────────────────
        location = /agent/stream {
            limit_req zone=api_zone burst=10 nodelay;

            proxy_pass         http://synapze_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";    # required for keepalive upstream
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE: disable ALL buffering — bytes must flow immediately
            proxy_buffering         off;
            proxy_cache             off;
            proxy_read_timeout      300s;   # 5 min max per stream
            proxy_send_timeout      300s;
            chunked_transfer_encoding on;

            # Disable gzip for SSE (streaming incompatible with gzip)
            gzip off;
        }

        # ── Auth endpoints (strict rate limit) ────────────────────────────────
        location ~ ^/auth/ {
            limit_req zone=auth_zone burst=3 nodelay;
            proxy_pass         http://synapze_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── API routes ────────────────────────────────────────────────────────
        location ~ ^/(agent|tasks|webhooks)/ {
            limit_req zone=api_zone burst=30 nodelay;
            proxy_pass         http://synapze_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Health — no rate limit, no logging (LB probes) ───────────────────
        location = /health {
            proxy_pass         http://synapze_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log         off;
        }

        # ── Metrics — internal only ───────────────────────────────────────────
        location = /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny  all;
            proxy_pass         http://synapze_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            proxy_pass         http://synapze_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   Connection "";
            proxy_read_timeout 30s;

            # Cache static assets
            location ~* \.(js|css|png|jpg|svg|woff2|ico)$ {
                proxy_pass         http://synapze_frontend;
                proxy_cache_valid  200 7d;
                add_header         Cache-Control "public, max-age=604800, immutable";
            }
        }

        # ── Block attacks ─────────────────────────────────────────────────────
        location ~ /\.          { deny all; access_log off; }
        location ~ \.php$       { deny all; access_log off; }
        location ~ /wp-         { deny all; access_log off; }
        location = /robots.txt  { access_log off; return 200 "User-agent: *\nDisallow: /\n"; }
    }
}
