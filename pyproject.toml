[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A"]
ignore = ["S101", "S603", "B008", "A002", "N818"]
exclude = ["tests/", "migrations/"]

[tool.ruff.per-file-ignores]
"app/db/database.py" = ["S608"]   # raw SQL is parameterized — false positive

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["app"]
omit = ["tests/*", "app/tasks/worker.py"]

[tool.coverage.report]
show_missing = true
fail_under = 70
